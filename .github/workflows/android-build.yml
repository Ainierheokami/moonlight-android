name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build nonRoot APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          install_android_packages() {
            sdkmanager --install \
              "platform-tools" \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "ndk;27.0.12077973"
          }

          for attempt in 1 2 3; do
            if install_android_packages; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Android package installation failed; retrying after cleanup."
            rm -rf "$ANDROID_HOME/ndk/27.0.12077973" "$ANDROID_HOME/.temp" "$ANDROID_HOME/temp"
            sleep 10
          done
          yes | sdkmanager --licenses >/dev/null

      - name: Normalize CI Gradle properties
        run: |
          sed -i '/^systemProp\.http\.proxy/d' gradle.properties
          sed -i '/^systemProp\.https\.proxy/d' gradle.properties
          sed -i 's/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Restore release signing keystore
        env:
          MOONLIGHT_RELEASE_KEYSTORE_BASE64: ${{ secrets.MOONLIGHT_RELEASE_KEYSTORE_BASE64 }}
          MOONLIGHT_RELEASE_STORE_PASSWORD: ${{ secrets.MOONLIGHT_RELEASE_STORE_PASSWORD }}
          MOONLIGHT_RELEASE_KEY_ALIAS: ${{ secrets.MOONLIGHT_RELEASE_KEY_ALIAS }}
          MOONLIGHT_RELEASE_KEY_PASSWORD: ${{ secrets.MOONLIGHT_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$MOONLIGHT_RELEASE_KEYSTORE_BASE64" ]; then
            echo "Release signing keystore secret is not configured; falling back to debug signing."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$MOONLIGHT_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/moonlight-release.jks"
          {
            echo "MOONLIGHT_RELEASE_STORE_FILE=$RUNNER_TEMP/signing/moonlight-release.jks"
            echo "MOONLIGHT_RELEASE_STORE_PASSWORD=$MOONLIGHT_RELEASE_STORE_PASSWORD"
            echo "MOONLIGHT_RELEASE_KEY_ALIAS=$MOONLIGHT_RELEASE_KEY_ALIAS"
            echo "MOONLIGHT_RELEASE_KEY_PASSWORD=$MOONLIGHT_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build nonRoot debug APK
        run: ./gradlew :app:assembleNonRootDebug --stacktrace

      - name: Build nonRoot release APK
        run: ./gradlew :app:assembleNonRootRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-nonroot-debug-apk
          path: app/build/outputs/apk/nonRoot/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-nonroot-release-apk
          path: app/build/outputs/apk/nonRoot/release/*.apk
          if-no-files-found: error

      - name: Prepare release APKs
        run: |
          mkdir -p release-apks
          cp app/build/outputs/apk/nonRoot/debug/*.apk release-apks/
          cp app/build/outputs/apk/nonRoot/release/*.apk release-apks/
          release_apk="$(basename "$(ls release-apks/*-release.apk | head -n 1)")"
          version_name="${release_apk#Moonlight-}"
          version_name="${version_name%-release.apk}"
          echo "VERSION_TAG=v${version_name}" >> "$GITHUB_ENV"
          echo "VERSION_TITLE=Moonlight ${version_name}" >> "$GITHUB_ENV"
          ls -lh release-apks

      - name: Publish versioned GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${VERSION_TAG}" "${GITHUB_SHA}"
          git push origin "${VERSION_TAG}" --force

          if gh release view "${VERSION_TAG}" >/dev/null 2>&1; then
            gh release edit "${VERSION_TAG}" \
              --title "${VERSION_TITLE}" \
              --notes "Automated APK build from commit ${GITHUB_SHA}."
          else
            gh release create "${VERSION_TAG}" \
              --title "${VERSION_TITLE}" \
              --notes "Automated APK build from commit ${GITHUB_SHA}."
          fi

          gh release upload "${VERSION_TAG}" release-apks/*.apk --clobber

      - name: Publish latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin latest --force

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest Android APK" \
              --notes "Automated APK build from commit ${GITHUB_SHA}."
          else
            gh release create latest \
              --title "Latest Android APK" \
              --notes "Automated APK build from commit ${GITHUB_SHA}."
          fi

          gh release view latest --json assets --jq '.assets[].name | select(endswith(".apk"))' | while read -r asset; do
            gh release delete-asset latest "$asset" --yes
          done

          gh release upload latest release-apks/*.apk --clobber
